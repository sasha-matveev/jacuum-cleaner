spring.application.name=jacuum-cleaner
server.port=8080

# Leaderboard (optional): set this path to enable file-based leaderboard storage
# todo : Sasha : this doesn't work. should be absolute path.
# leaderboard.path=/path/to/leaderboard.db

# H2 in-memory datasource (used as fallback; replaced by file path when leaderboard.path is set)
spring.datasource.url=jdbc:h2:mem:jacuum;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
